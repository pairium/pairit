schema_version: 0.1.0
allowRetake: true
initialPageId: intro

pages:
  - id: intro
    components:
      - type: text
        props:
          text: "Welcome to the component events showcase."
      - type: buttons
        props:
          buttons:
            - id: start
              text: "Begin"
              action:
                type: go_to
                target: survey
              events:
                onClick:
                  type: "button_click"
                  data:
                    button_id: "start"
                    section: "navigation"

  - id: survey
    components:
      - type: survey
        props:
          items:
            - id: satisfaction
              text: "How satisfied are you?"
              answer: likert5
      - type: buttons
        props:
          buttons:
            - id: submit
              text: "Submit"
              action:
                type: go_to
                target: thanks

  - id: thanks
    end: true
    components:
      - type: text
        props:
          text: "Thank you!"
