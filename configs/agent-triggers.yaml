schema_version: 0.1.0
allowRetake: true
initialPageId: intro

pages:
  - id: intro
    components:
      - type: text
        props:
          text: |
            # Agent Trigger Demo

            Agents can use `trigger` and `replyCondition` to control when and whether they respond.

            This demo has **3 pages**, each with one agent using a different reply policy:

            1. **Greeter** — `trigger: on_join` — sends a message every time the chat page loads, even if there's already chat history. Try navigating away and back.
            2. **Coach** — `trigger: { every: 3 }` — stays silent until every 3rd participant message, then gives feedback. Count your messages!
            3. **Facilitator** — `replyCondition: "Reply only if the participant asked a direct question or seems stuck."` — receives every message but uses an LLM check to decide whether to actually respond. Try sending statements vs. questions.

            This config also assigns custom avatars to each agent so you can visually test chat avatars, including one image-based avatar.
      - type: buttons
        props:
          buttons:
            - id: start
              text: "Start demo"
              action:
                type: go_to
                target: greeter-page

  - id: greeter-page
    components:
      - type: text
        props:
          text: |
            ### 1. Greeter — `trigger: on_join`

            This agent greets you every time the page loads, even if there's existing chat history.
            Try navigating away and coming back — it will greet you again.
      - type: chat
        props:
          agents:
            - greeter
      - type: buttons
        props:
          buttons:
            - id: next1
              text: "Next: Every-3 Coach →"
              action:
                type: go_to
                target: coach-page

  - id: coach-page
    components:
      - type: text
        props:
          text: |
            ### 2. Coach — `trigger: { every: 3 }`

            This agent only responds every 3rd message you send.
            Send a few messages and count — it will stay silent until message #3.
      - type: chat
        props:
          agents:
            - coach
      - type: buttons
        props:
          buttons:
            - id: back1
              text: "← Back: Greeter"
              action:
                type: go_to
                target: greeter-page
            - id: next2
              text: "Next: Facilitator →"
              action:
                type: go_to
                target: facilitator-page

  - id: facilitator-page
    components:
      - type: text
        props:
          text: |
            ### 3. Facilitator — `replyCondition`

            This agent receives every message but only replies when it thinks you asked a question or seem stuck.
            Try sending casual statements vs. direct questions and see the difference.
      - type: chat
        props:
          agents:
            - facilitator
      - type: buttons
        props:
          buttons:
            - id: back2
              text: "← Back: Coach"
              action:
                type: go_to
                target: coach-page
            - id: done
              text: "Done"
              action:
                type: go_to
                target: thanks

  - id: thanks
    end: true
    components:
      - type: text
        props:
          text: "Thank you for trying the agent trigger demo!"

agents:
  # Greets every time the chat page loads, even with existing history
  - id: greeter
    model: "gpt-5-mini"
    avatar:
      icon: hand
    trigger: on_join
    system: |
      You are a friendly greeter. Say a brief welcome message (one sentence).

  # Only responds every 3 participant messages
  - id: coach
    model: "gpt-5-mini"
    avatar:
      icon: badge-help
    trigger:
      every: 3
    system: |
      You are a writing coach. Give brief feedback on the participant's
      last few messages. One sentence max.

  # Responds to every message but only when the LLM thinks it's appropriate
  - id: facilitator
    model: "gpt-5-mini"
    avatar:
      image: https://placehold.co/64x64/png
    trigger: every_message
    replyCondition: "Reply only if the participant asked a direct question or seems stuck."
    system: |
      You are a helpful facilitator. Answer questions and offer guidance.
      Keep responses to 1-2 sentences.
